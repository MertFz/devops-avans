global:
  scrape_interval: 10s
  evaluation_interval: 10s

alerting:
  alertmanagers:
  - static_configs:
    - targets:
      - alertmanager:9093

rule_files:
  - "/etc/prometheus/alert.rules.yml"

scrape_configs:
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
  - job_name: 'avans-api'
    static_configs:
      - targets: ['api:12345']
  - job_name: 'avans-db-exporter'
    static_configs:
      - targets: ['db-exporter:9216']
